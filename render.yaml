services:
  - type: web
    name: hancom-attendance-bot
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false # Buni Render panelida o'zingiz kiritasiz
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.11

databases:
  - name: attendance-db
    plan: free
    region: frankfurt
